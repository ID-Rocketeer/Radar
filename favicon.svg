<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <!-- Semi-transparent dark green background to ensure high contrast on light, dark, or colored tabs -->
    <circle cx="16" cy="16" r="14" fill="rgba(1, 12, 3, 0.9)" stroke="#00ff55" stroke-width="2" />
    <!-- Concentric range ring -->
    <circle cx="16" cy="16" r="8" fill="none" stroke="#00ff55" stroke-width="1.2" stroke-dasharray="2 1.5" opacity="0.6" />
    <!-- Center radar dot -->
    <circle cx="16" cy="16" r="1.5" fill="#00ff55" />
    <!-- 30-degree sweep fade trail (from 70 deg back to 40 deg counter-clockwise) -->
    <path d="M 16 16 L 29.16 11.21 A 14 14 0 0 0 25.0 5.27 Z" fill="#00ff55" opacity="0.35" />
    <!-- Bright sweep line at exactly 70 degrees clockwise -->
    <line x1="16" y1="16" x2="29.16" y2="11.21" stroke="#33ff77" stroke-width="2.5" stroke-linecap="round" />
</svg>
